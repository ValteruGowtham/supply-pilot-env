name: supply_pilot
version: "1.0.0"
description: "Supply chain inventory management RL environment. An AI agent manages stock levels, reorder decisions, and supplier selection across 3 tasks of increasing difficulty — from stable single-SKU management to multi-product seasonal demand and supplier disruption handling."
author: "Gowtham1111"
tags:
  - openenv
  - supply-chain
  - inventory
  - real-world
  - rl-environment

tasks:
  - id: task_1
    name: "Single SKU stable demand"
    difficulty: easy
    description: "Manage inventory for one product with fixed daily demand of 50 units. Avoid stockouts over 30 days. Graded on stockout-free days."
    grader:
      type: python
      code: |
        try:
          stockout_days = float(getattr(state, "stockout_days", 0.0))
        except Exception:
          stockout_days = 0.0
        raw = 1.0 - (stockout_days / 30.0)
        if raw != raw:  # NaN guard
          raw = 0.5
        return max(0.01, min(0.99, float(raw)))
  - id: task_2
    name: "Multi-SKU seasonal demand"
    difficulty: medium
    description: "Balance inventory across 3 products with variable demand patterns under a 500-unit daily order budget. Graded on weighted fill rate."
    grader:
      type: python
      code: |
        try:
          raw = float(getattr(state, "fill_rate", 0.5))
        except Exception:
          raw = 0.5
        if raw != raw:  # NaN guard
          raw = 0.5
        return max(0.01, min(0.99, float(raw)))
  - id: task_3
    name: "Supplier disruption response"
    difficulty: hard
    description: "Handle a sudden supplier disruption on day 10 that extends lead time from 3 to 14 days. Agent must detect signal and switch to backup supplier. Graded on service level and supplier switching speed."
    grader:
      type: python
      code: |
        try:
          service = float(getattr(state, "fill_rate", 0.5))
        except Exception:
          service = 0.5
        try:
          switch = float(getattr(state, "supplier_switch_score", 0.5))
        except Exception:
          switch = 0.5
        if service != service:  # NaN guard
          service = 0.5
        if switch != switch:  # NaN guard
          switch = 0.5
        raw = (0.6 * service) + (0.4 * switch)
        return max(0.01, min(0.99, float(raw)))

action_space:
  type: object
  properties:
    sku_id:
      type: string
      description: "Product to reorder (SKU_A, SKU_B, SKU_C)"
    order_quantity:
      type: integer
      minimum: 0
      maximum: 500
      description: "Units to order, 0 means no order"
    supplier_id:
      type: string
      enum: ["primary", "backup"]
      description: "Which supplier to use"
    expedite:
      type: boolean
      description: "Pay premium to reduce lead time by 1 day"

observation_space:
  type: object
  properties:
    sku_id:
      type: string
    stock_level:
      type: integer
    daily_demand:
      type: number
    pending_order_units:
      type: integer
    supplier_lead_time:
      type: integer
    day:
      type: integer
    stockout_today:
      type: boolean
    disruption_active:
      type: boolean
    reward:
      type: number
    done:
      type: boolean
